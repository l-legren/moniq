document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3.5 2\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:11px; font-weight:400;\">Today<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ goRecurring }}\" style=\"display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; color:{{ tcRecurring }}; flex:1;\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 0114-7.5L20 7M21 12a9 9 0 01-14 7.5L4 17\"><\u002Fpath><path d=\"M20 3v4h-4M4 21v-4h4\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:11px; font-weight:400;\">Recurring<\u002Fspan>\n        <\u002Fdiv>\n        <div onclick=\"{{ goInsights }}\" style=\"display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer; color:{{ tcInsights }}; flex:1;\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"><path d=\"M4 19V5M4 19h16\"><\u002Fpath><path d=\"M8 16l3.5-4 3 2.5L20 8\"><\u002Fpath><\u002Fsvg>\n          <span style=\"font-size:11px; font-weight:400;\">Insights<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n  <\u002Fx-import>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:500,&quot;height&quot;:960},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;'dark' | 'light'&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab: 'today',\n    userTheme: null,\n    adding: false,\n    draftAmount: '',\n    draftCat: null,\n    expenses: [\n      { id: 1, cat: 'groceries', amount: 12.40, time: '13:10' },\n      { id: 2, cat: 'drinks', amount: 3.80, time: '08:24' },\n    ],\n    todayOpen: false,\n    liveFrac: null,\n\n    income: [\n      { id: 1, name: 'Salary', sub: 'Monthly', amount: 2400 },\n      { id: 2, name: 'Freelance', sub: 'Avg / month', amount: 350 },\n    ],\n    costs: [\n      { id: 1, name: 'Rent', sub: 'Monthly', amount: 950 },\n      { id: 2, name: 'Health insurance', sub: 'Monthly', amount: 120 },\n      { id: 3, name: 'Transit pass', sub: 'Monthly', amount: 59 },\n      { id: 4, name: 'Gym', sub: 'Monthly', amount: 30 },\n      { id: 5, name: 'Phone', sub: 'Monthly', amount: 29 },\n      { id: 6, name: 'Spotify', sub: 'Monthly', amount: 11 },\n    ],\n    savingsGoal: 350,\n\n    recurringModalOpen: false,\n    newType: 'expense',\n    newName: '',\n    newAmount: '',\n    newFrequency: 'perpetual',\n    newLastPayment: '',\n\n    settingsOpen: false,\n    incomeCollapsed: false,\n    costsCollapsed: false,\n\n    insightsPeriod: 'monthly',\n    insMonthIdx: 2,\n    insWeekIdx: 2,\n  };\n\n  MONTHS = [\n    { label: 'April 2026', saved: 300, weekly: [70, 85, 75, 70] },\n    { label: 'May 2026', saved: 355, weekly: [80, 95, 90, 90] },\n    { label: 'June 2026', saved: 290, weekly: [85, 60, 80, 65] },\n  ];\n  WEEKS = [\n    { label: '2 weeks ago', saved: 70, daily: [40, 45, 30, 38, 20, 44, 15] },\n    { label: 'Last week', saved: 82, daily: [35, 50, 28, 42, 22, 40, 18] },\n    { label: 'This week', saved: 78, daily: [38, 52, 29, 40, 18, 47, 16] },\n  ];\n\n  rawFrac = 0;\n  containerH = 700;\n  dragging = false;\n  dragStartY = 0;\n  dragStartFrac = 0;\n  idleTimer = null;\n\n  setWrapRef = (el) => {\n    if (el) { this.wrapEl = el; this.containerH = el.clientHeight || this.containerH; }\n  };\n\n  keypadH = 254;\n  setKeypadRef = (el) => {\n    if (el) { this.keypadH = el.clientHeight || this.keypadH; this.forceUpdate(); }\n  };\n\n  clamp01(x) { return x < 0 ? 0 : x > 1 ? 1 : x; }\n\n  settleToday = () => {\n    const open = this.rawFrac > 0.35;\n    this.rawFrac = open ? 1 : 0;\n    this.setState({ todayOpen: open, liveFrac: null });\n  };\n\n  onTodayWheel = (e) => {\n    e.preventDefault();\n    const H = this.containerH || 700;\n    this.rawFrac = this.clamp01(this.rawFrac + (e.deltaY / H));\n    this.setState({ liveFrac: this.rawFrac });\n    clearTimeout(this.idleTimer);\n    this.idleTimer = setTimeout(this.settleToday, 160);\n  };\n\n  onHandleDown = (e) => {\n    this.dragging = true;\n    this.dragStartY = e.clientY;\n    this.dragStartFrac = this.rawFrac;\n  };\n\n  onHandleMove = (e) => {\n    if (!this.dragging) return;\n    const H = this.containerH || 700;\n    const dy = this.dragStartY - e.clientY;\n    this.rawFrac = this.clamp01(this.dragStartFrac + dy / H);\n    this.setState({ liveFrac: this.rawFrac });\n  };\n\n  onHandleUp = () => {\n    if (!this.dragging) return;\n    this.dragging = false;\n    this.settleToday();\n  };\n\n  CATS = {\n    groceries:   { label: 'Groceries' },\n    drinks:      { label: 'Drinks' },\n    restaurants: { label: 'Restaurants' },\n    clothing:    { label: 'Clothing' },\n    transport:   { label: 'Transport' },\n    other:       { label: 'Other' },\n  };\n\n  THEMES = {\n    dark: {\n      bg: '#14110C', card: '#1E1A14', text: '#F4EEE2', text2: '#B5AFA0', text3: '#7A726A',\n      hairline: 'rgba(245,235,220,0.10)',\n      accent: '#FF7A59', accentLight: 'rgba(255,122,89,0.14)',\n      accent2: '#5FA8E8', accent2Light: 'rgba(95,168,232,0.14)',\n      good: '#5FBF86', goodLight: 'rgba(95,191,134,0.14)', bad: '#F2637A',\n      neutralSel: 'rgba(245,235,220,0.09)',\n      backdrop: 'radial-gradient(120% 120% at 50% 0%, #2a2520 0%, #171410 55%, #100d0a 100%)',\n      scrim: 'rgba(8,6,4,0.5)',\n    },\n    light: {\n      bg: '#F6F1E8', card: '#FFFFFF', text: '#2C2318', text2: '#8B7F6D', text3: '#A89D89',\n      hairline: 'rgba(60,45,20,0.10)',\n      accent: '#E85C3C', accentLight: 'rgba(232,92,60,0.12)',\n      accent2: '#2E7BC4', accent2Light: 'rgba(46,123,196,0.12)',\n      good: '#3E9A64', goodLight: 'rgba(62,154,100,0.14)', bad: '#D94F63',\n      neutralSel: 'rgba(60,45,20,0.07)',\n      backdrop: 'radial-gradient(120% 120% at 50% 0%, #F0E8D8 0%, #E7DCC8 60%, #DED2BB 100%)',\n      scrim: 'rgba(40,30,15,0.25)',\n    },\n  };\n\n  fmt(n)  { return '€' + Number(n).toFixed(2); }\n  fmtR(n) { return '€' + Math.round(n).toLocaleString('en-US'); }\n\n  theme() { return this.state.userTheme || this.props.theme || 'dark'; }\n\n  go(t) { return () => this.setState({ tab: t }); }\n  pickCat(k) { return () => this.setState({ draftCat: k }); }\n  onKey(v) { return () => this.press(v); }\n\n  toggleTheme = () => this.setState({ userTheme: this.theme() === 'dark' ? 'light' : 'dark' });\n\n  toggleAdd = () => {\n    if (parseFloat(this.state.draftAmount) > 0) {\n      this.setState(s => ({ adding: !s.adding }));\n    }\n  };\n\n  goBack = () => this.setState({ adding: false });\n\n  openSettings = () => this.setState({ settingsOpen: true });\n  closeSettings = () => this.setState({ settingsOpen: false });\n  toggleIncome = () => this.setState(s => ({ incomeCollapsed: !s.incomeCollapsed }));\n  toggleCosts = () => this.setState(s => ({ costsCollapsed: !s.costsCollapsed }));\n\n  setWeekly = () => this.setState({ insightsPeriod: 'weekly' });\n  setMonthly = () => this.setState({ insightsPeriod: 'monthly' });\n  prevPeriod = () => this.setState(s => s.insightsPeriod === 'monthly'\n    ? { insMonthIdx: Math.max(0, s.insMonthIdx - 1) }\n    : { insWeekIdx: Math.max(0, s.insWeekIdx - 1) });\n  nextPeriod = () => this.setState(s => s.insightsPeriod === 'monthly'\n    ? { insMonthIdx: Math.min(this.MONTHS.length - 1, s.insMonthIdx + 1) }\n    : { insWeekIdx: Math.min(this.WEEKS.length - 1, s.insWeekIdx + 1) });\n\n  press(v) {\n    this.setState(s => {\n      let a = s.draftAmount;\n      if (v === 'del') return { draftAmount: a.slice(0, -1) };\n      if (v === '.') {\n        if (a.includes('.')) return {};\n        return { draftAmount: (a === '' ? '0' : a) + '.' };\n      }\n      if (a.includes('.') && a.split('.')[1].length >= 2) return {};\n      if (a.replace('.', '').length >= 6) return {};\n      if (a === '0') a = '';\n      return { draftAmount: a + v };\n    });\n  }\n\n  confirmAdd = () => {\n    const amt = parseFloat(this.state.draftAmount);\n    if (!amt || amt <= 0 || !this.state.draftCat) return;\n    const d = new Date();\n    const time = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');\n    const exp = { id: Date.now(), cat: this.state.draftCat, amount: amt, time };\n    this.setState({ expenses: [exp, ...this.state.expenses], adding: false, draftAmount: '', draftCat: null });\n  };\n\n  formatMonth(ym) {\n    const [y, m] = ym.split('-').map(Number);\n    if (!y || !m) return '';\n    const d = new Date(y, m - 1, 1);\n    return d.toLocaleString('en-US', { month: 'short', year: 'numeric' });\n  }\n\n  openAddExpenseModal = () => this.setState({\n    recurringModalOpen: true, newType: 'expense', newName: '', newAmount: '',\n    newFrequency: 'perpetual', newLastPayment: '',\n  });\n  closeRecurringModal = () => this.setState({ recurringModalOpen: false });\n\n  selectExpense = () => this.setState({ newType: 'expense' });\n  selectIncome = () => this.setState({ newType: 'income' });\n  selectPerpetual = () => this.setState({ newFrequency: 'perpetual' });\n  selectFixed = () => this.setState({ newFrequency: 'fixed' });\n\n  onNameChange = (e) => this.setState({ newName: e.target.value });\n  onAmountChange = (e) => {\n    const v = e.target.value.replace(/[^0-9.]/g, '');\n    this.setState({ newAmount: v });\n  };\n  onLastPaymentChange = (e) => this.setState({ newLastPayment: e.target.value });\n  onGoalSlide = (e) => this.setState({ savingsGoal: parseInt(e.target.value, 10) });\n\n  confirmRecurring = () => {\n    const amt = parseFloat(this.state.newAmount);\n    const name = this.state.newName.trim();\n    if (!name || !amt || amt <= 0) return;\n    const isIncome = this.state.newType === 'income';\n    let sub = 'Monthly';\n    if (this.state.newFrequency === 'fixed' && this.state.newLastPayment) {\n      const label = this.formatMonth(this.state.newLastPayment);\n      sub = label ? ('Until ' + label) : 'Monthly';\n    }\n    const item = { id: Date.now(), name, sub, amount: amt };\n    this.setState(s => ({\n      income: isIncome ? [item, ...s.income] : s.income,\n      costs: !isIncome ? [item, ...s.costs] : s.costs,\n      recurringModalOpen: false,\n    }));\n  };\n\n  renderVals() {\n    const C = this.CATS;\n    const s = this.state;\n    const dark = this.theme() === 'dark';\n    const pal = dark ? this.THEMES.dark : this.THEMES.light;\n\n    // ---- Today ----\n    const dailyBudget = 40;\n    const spent = s.expenses.reduce((a, e) => a + e.amount, 0);\n    const remaining = dailyBudget - spent;\n    const over = remaining < 0;\n    const expenseRows = s.expenses.map(e => ({\n      id: e.id, label: C[e.cat].label,\n      time: e.time, amountLabel: this.fmt(e.amount),\n    }));\n\n    // resisted-scroll pager: quadratic ease-in gives the \"hard scroll\" resistance\n    const rawFrac = s.liveFrac != null ? s.liveFrac : (s.todayOpen ? 1 : 0);\n    const visualFrac = rawFrac * rawFrac;\n    const isDragging = s.liveFrac != null;\n    const pagerTranslate = '-' + (visualFrac * 50).toFixed(2) + '%';\n    const pagerTransition = isDragging ? 'none' : 'transform 420ms cubic-bezier(0.32,0.72,0,1)';\n    const pullHintOpacity = Math.max(0, 1 - rawFrac * 2.5);\n\n    // ---- Recurring ----\n    const income = s.income;\n    const costs = s.costs;\n    const incomeTotal = income.reduce((a, r) => a + r.amount, 0);\n    const costsTotal = costs.reduce((a, r) => a + r.amount, 0);\n    const savingsGoal = s.savingsGoal;\n    const allowance = (incomeTotal - costsTotal - savingsGoal) / 30;\n\n    // ---- Add recurring modal ----\n    const isIncomeType = s.newType === 'income';\n    const isFixedFreq = s.newFrequency === 'fixed';\n    const draftRecurAmt = parseFloat(s.newAmount) || 0;\n    const previewIncomeTotal = incomeTotal + (isIncomeType ? draftRecurAmt : 0);\n    const previewCostsTotal = costsTotal + (!isIncomeType ? draftRecurAmt : 0);\n    const previewAllowance = (previewIncomeTotal - previewCostsTotal - savingsGoal) / 30;\n    const canConfirmRecurring = !!s.newName.trim() && draftRecurAmt > 0;\n\n    // ---- Insights (period switchable: weekly / monthly) ----\n    const isMonthly = s.insightsPeriod === 'monthly';\n    let insSaved, insGoal, insSavedCaption, chartTitle, chartFooter, chartBars, periodLabel, atStart, atEnd;\n\n    if (isMonthly) {\n      const m = this.MONTHS[s.insMonthIdx];\n      insSaved = m.saved;\n      insGoal = savingsGoal;\n      insSavedCaption = 'Saved this month';\n      periodLabel = m.label;\n      chartTitle = 'Weekly savings';\n      chartFooter = 'Monthly goal ' + this.fmtR(insGoal);\n      const wkMax = Math.max(...m.weekly) * 1.25;\n      chartBars = m.weekly.map((v, i) => ({\n        label: 'W' + (i + 1),\n        heightPct: v / wkMax * 100,\n        color: pal.good,\n      }));\n      atStart = s.insMonthIdx === 0;\n      atEnd = s.insMonthIdx === this.MONTHS.length - 1;\n    } else {\n      const w = this.WEEKS[s.insWeekIdx];\n      insSaved = w.saved;\n      insGoal = Math.round(savingsGoal / 4);\n      insSavedCaption = 'Saved this week';\n      periodLabel = w.label;\n      chartTitle = 'Daily spend';\n      chartFooter = 'Budget ' + this.fmt(dailyBudget) + ' / day';\n      const dLabels = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];\n      const dMax = Math.max(...w.daily, dailyBudget) * 1.2;\n      chartBars = w.daily.map((v, i) => ({\n        label: dLabels[i],\n        heightPct: v / dMax * 100,\n        color: v > dailyBudget ? pal.bad : pal.good,\n      }));\n      atStart = s.insWeekIdx === 0;\n      atEnd = s.insWeekIdx === this.WEEKS.length - 1;\n    }\n    const insSavedPct = Math.min(100, insSaved / insGoal * 100);\n    const insOnTrack = insSaved >= insGoal * 0.8;\n\n    // greeting\n    const hr = new Date().getHours();\n    const greeting = hr < 12 ? 'Good morning' : (hr < 18 ? 'Good afternoon' : 'Good evening');\n    const breakdown = [\n      { cat: 'groceries', amount: 243 },\n      { cat: 'restaurants', amount: 188 },\n      { cat: 'clothing', amount: 140 },\n      { cat: 'drinks', amount: 96 },\n      { cat: 'transport', amount: 72 },\n      { cat: 'other', amount: 54 },\n    ];\n    const breakdownRows = breakdown.map(b => ({\n      label: C[b.cat].label,\n      amountLabel: this.fmtR(b.amount),\n    }));\n    const tips = [\n      { t: 'Dining out is climbing', b: 'Restaurants up 32% vs last month. Cap at €150 to save €40 more toward your goal.' },\n      { t: 'Weekends spike', b: 'You stay under €40 on weekdays but run over Fri–Sun. A small weekend buffer would smooth things out.' },\n    ];\n\n    // ---- Inline add ----\n    const cats = Object.keys(C).map(k => {\n      const sel = k === s.draftCat;\n      return {\n        key: k, label: C[k].label,\n        selected: sel,\n        onClick: this.pickCat(k),\n        bg: sel ? pal.accentLight : pal.card,\n        border: sel ? pal.accent : pal.hairline,\n        text: sel ? pal.accent : pal.text2,\n      };\n    });\n    const keys = ['1','2','3','4','5','6','7','8','9','.','0','del'].map(v => ({\n      label: v === 'del' ? '⌫' : v, onClick: this.onKey(v),\n    }));\n    const hasAmount = parseFloat(s.draftAmount) > 0;\n    const adding = s.adding && hasAmount;\n    const canConfirm = hasAmount && !!s.draftCat;\n\n    return {\n      // theme\n      t: pal,\n      isDark: dark,\n      isLight: !dark,\n      toggleTheme: this.toggleTheme,\n      scrim: pal.scrim,\n\n      // tabs\n      todayDisplay: s.tab === 'today' ? 'block' : 'none',\n      recurringDisplay: s.tab === 'recurring' ? 'block' : 'none',\n      insightsDisplay: s.tab === 'insights' ? 'block' : 'none',\n      goToday: this.go('today'), goRecurring: this.go('recurring'), goInsights: this.go('insights'),\n      tcToday: s.tab === 'today' ? pal.accent : pal.text3,\n      tcRecurring: s.tab === 'recurring' ? pal.accent : pal.text3,\n      tcInsights: s.tab === 'insights' ? pal.accent : pal.text3,\n\n      // today\n      dateLabel: 'Tuesday · 23 June',\n      greeting,\n      userName: 'Mara',\n      amountDisplay: s.draftAmount ? '€' + s.draftAmount : '—',\n      keys, cats,\n      toggleAdd: this.toggleAdd,\n      confirmAdd: this.confirmAdd,\n      addBtnLabel: adding ? 'Choose a category' : 'Add',\n      addBtnBg: adding ? 'transparent' : (hasAmount ? pal.accent : pal.card),\n      addBtnText: adding ? pal.text3 : (hasAmount ? '#1A140A' : pal.text3),\n      addWrapBorder: adding ? pal.accent : pal.hairline,\n      addMarginTop: adding ? ((14 - this.keypadH) + 'px') : '14px',\n      setKeypadRef: this.setKeypadRef,\n      isAdding: adding,\n      goBack: this.goBack,\n      confirmBtnBg: canConfirm ? pal.accent : pal.card,\n      confirmBtnText: canConfirm ? '#1A140A' : pal.text3,\n      confirmBtnOpacity: canConfirm ? 1 : 0.5,\n\n      // resisted-scroll pager\n      todayHeight: '100%',\n      setWrapRef: this.setWrapRef,\n      onTodayWheel: this.onTodayWheel,\n      onHandleDown: this.onHandleDown,\n      onHandleMove: this.onHandleMove,\n      onHandleUp: this.onHandleUp,\n      pagerTranslate, pagerTransition, pullHintOpacity,\n\n      heroCaption: over ? 'Over by' : 'Left today',\n      remainingLabel: this.fmt(Math.abs(remaining)),\n      dailyBudgetLabel: this.fmt(dailyBudget),\n      hasExpenses: s.expenses.length > 0,\n      expenseRows,\n\n      // recurring\n      incomeTotalLabel: this.fmtR(incomeTotal),\n      costsTotalLabel: this.fmtR(costsTotal),\n      savingsGoalLabel: this.fmtR(savingsGoal),\n      allowanceLabel: this.fmtR(allowance),\n      incomeRows: income.map(r => ({ ...r, amountLabel: this.fmtR(r.amount) })),\n      costRows: costs.map(r => ({ ...r, amountLabel: this.fmtR(r.amount) })),\n\n      // add recurring modal\n      recurringModalOpen: s.recurringModalOpen,\n      openAddExpenseModal: this.openAddExpenseModal,\n      closeRecurringModal: this.closeRecurringModal,\n      newName: s.newName,\n      onNameChange: this.onNameChange,\n      newAmount: s.newAmount,\n      onAmountChange: this.onAmountChange,\n      newLastPayment: s.newLastPayment,\n      onLastPaymentChange: this.onLastPaymentChange,\n      isIncomeType, isFixedFreq,\n      selectExpense: this.selectExpense,\n      selectIncome: this.selectIncome,\n      selectPerpetual: this.selectPerpetual,\n      selectFixed: this.selectFixed,\n      expenseTypeBg: !isIncomeType ? pal.accentLight : pal.card,\n      expenseTypeBorder: !isIncomeType ? pal.accent : pal.hairline,\n      expenseTypeText: !isIncomeType ? pal.accent : pal.text2,\n      incomeTypeBg: isIncomeType ? pal.goodLight : pal.card,\n      incomeTypeBorder: isIncomeType ? pal.good : pal.hairline,\n      incomeTypeText: isIncomeType ? pal.good : pal.text2,\n      perpetualBg: !isFixedFreq ? pal.neutralSel : pal.card,\n      perpetualBorder: !isFixedFreq ? pal.text3 : pal.hairline,\n      perpetualText: !isFixedFreq ? pal.text : pal.text2,\n      fixedBg: isFixedFreq ? pal.neutralSel : pal.card,\n      fixedBorder: isFixedFreq ? pal.text3 : pal.hairline,\n      fixedText: isFixedFreq ? pal.text : pal.text2,\n      savingsGoalValue: savingsGoal,\n      onGoalSlide: this.onGoalSlide,\n      previewAllowanceLabel: this.fmtR(previewAllowance),\n      newTypeLabel: isIncomeType ? 'income' : 'expense',\n      confirmRecurring: this.confirmRecurring,\n      recurringConfirmBg: canConfirmRecurring ? (isIncomeType ? pal.good : pal.accent) : pal.card,\n      recurringConfirmText: canConfirmRecurring ? '#1A140A' : pal.text3,\n      recurringConfirmOpacity: canConfirmRecurring ? 1 : 0.5,\n\n      // collapsible sections\n      toggleIncome: this.toggleIncome,\n      toggleCosts: this.toggleCosts,\n
